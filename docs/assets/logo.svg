<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="townsquare logo">
  <title>townsquare</title>
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5bc0be"/>
      <stop offset="100%" stop-color="#a99cf0"/>
    </linearGradient>
    <linearGradient id="hub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a99cf0"/>
      <stop offset="100%" stop-color="#5bc0be"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="256" height="256" rx="56" fill="#0b132b"/>

  <!-- Federation hub-and-spoke -->
  <g stroke="url(#accent)" stroke-width="3" opacity="0.85" fill="none">
    <line x1="128" y1="128" x2="60" y2="60"/>
    <line x1="128" y1="128" x2="196" y2="60"/>
    <line x1="128" y1="128" x2="60" y2="196"/>
    <line x1="128" y1="128" x2="196" y2="196"/>
  </g>

  <!-- Outer user nodes -->
  <g fill="#1c2541" stroke="#5bc0be" stroke-width="3">
    <circle cx="60" cy="60" r="18"/>
    <circle cx="196" cy="60" r="18"/>
    <circle cx="60" cy="196" r="18"/>
    <circle cx="196" cy="196" r="18"/>
  </g>

  <!-- Central hub -->
  <circle cx="128" cy="128" r="32" fill="url(#hub)"/>
  <circle cx="128" cy="128" r="32" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.9"/>

  <!-- TS monogram -->
  <text x="128" y="135"
        text-anchor="middle"
        font-family="Inter, SF Pro Display, system-ui, sans-serif"
        font-weight="800"
        font-size="22"
        fill="#0b132b"
        letter-spacing="0">ts</text>
</svg>
